<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falcão Leenne – Emissão de Notas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    
    /* Spinner */
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
      border-left-color: #8b5cf6; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen font-sans selection:bg-violet-600/30">

  <header class="border-b border-white/5 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
        <span class="text-2xl">🦅</span>
        <h1 class="font-semibold text-xl text-white tracking-tight">Falcão Leenne</h1>
      </div>
      
      <div id="headerMeta" class="hidden items-center gap-3">
        <button id="btnVoltar" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Voltar
        </button>
        <div class="h-4 w-px bg-zinc-800 mx-2 hidden sm:block"></div>
        <span id="bmTitle" class="px-2.5 py-1 text-xs font-medium rounded-full bg-zinc-900 text-zinc-300 border border-zinc-800 hidden sm:inline-flex"></span>
        <span id="periodoTitle" class="px-2.5 py-1 text-xs font-medium rounded-full bg-zinc-900 text-zinc-300 border border-zinc-800 hidden md:inline-flex"></span>
        <span id="stats" class="px-2.5 py-1 text-xs font-medium rounded-full bg-violet-500/10 text-violet-400 border border-violet-500/20"></span>
      </div>
    </div>
  </header>

  <main class="w-full max-w-[1800px] mx-auto p-4 md:p-8">
    <!-- Dashboard -->
    <section id="dashboard-section">
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-3xl font-bold text-white tracking-tight">Boletins de Medição</h2>
        <button id="btnNovaPlanilha" class="px-4 py-2.5 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-all duration-200 transform active:scale-95 flex items-center gap-2 shadow-lg shadow-violet-500/20">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Nova Planilha
        </button>
        <input type="file" id="fileInputPlanilha" accept=".xlsx,.xls" class="hidden" />
      </div>
      <div id="bmList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </section>

    <!-- Main View (Cidades) -->
    <section id="main-section" class="hidden">
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
        <h2 id="mainSectionTitle" class="text-2xl font-semibold text-white tracking-tight">Notas por Cidade</h2>
        <div class="flex flex-wrap gap-3">
          <button id="btnViewResumo" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium rounded-lg transition-colors flex items-center gap-2 border border-white/10 shadow-lg shadow-black/20">
            <svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span id="btnViewResumoText">Resumo BM</span>
          </button>
          <button id="btnDownloadZip" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2 shadow-lg shadow-violet-500/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Baixar Anexos
          </button>
          <button id="filterPendentes" class="px-4 py-2 bg-transparent border border-white/10 hover:bg-white/5 text-zinc-300 text-sm font-medium rounded-lg transition-colors flex items-center gap-2">
            <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Só Pendentes
          </button>
        </div>
      </div>
      <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

      <!-- Tabela de Resumo (Oculta por padrão) -->
      <div id="resumo-container" class="hidden overflow-hidden rounded-2xl border border-white/5 bg-zinc-900/50 backdrop-blur-md">
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm text-zinc-400">
            <thead class="bg-black/20 text-xs uppercase text-zinc-500 border-b border-white/5">
              <tr>
                <th scope="col" colspan="3" class="px-6 py-3 font-bold tracking-wider text-center text-violet-400 border-b border-white/5 border-r">Normal</th>
                <th scope="col" colspan="3" class="px-6 py-3 font-bold tracking-wider text-center text-amber-500 border-b border-white/5">Reajuste</th>
              </tr>
              <tr>
                <!-- Normal -->
                <th scope="col" class="px-4 py-3 font-medium tracking-wider text-right">Passagem</th>
                <th scope="col" class="px-4 py-3 font-medium tracking-wider text-right">Alimentação</th>
                <th scope="col" class="px-4 py-3 font-medium tracking-wider text-right border-r border-white/5">Valor NF</th>
                
                <!-- Reajuste -->
                <th scope="col" class="px-4 py-3 font-medium tracking-wider text-right">Passagem</th>
                <th scope="col" class="px-4 py-3 font-medium tracking-wider text-right">Alimentação</th>
                <th scope="col" class="px-4 py-3 font-medium tracking-wider text-right">Valor NF</th>
              </tr>
            </thead>
            <tbody id="resumo-tbody" class="divide-y divide-white/5">
              <!-- linhas inseridas por JS -->
            </tbody>
            <tfoot class="bg-violet-500/5 border-t border-violet-500/10">
              <tr id="resumo-tfoot" class="font-bold text-zinc-200">
                <!-- totais inseridos por JS -->
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </section>
  </main>

  <input type="file" id="fileInputAnexo" class="hidden" accept="image/*,.pdf" />

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="fixed inset-0 bg-zinc-950/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center text-zinc-300">
    <div class="spinner mb-4"></div>
    <p class="text-sm font-medium">Processando, por favor aguarde...</p>
  </div>

  <!-- Libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <!-- Parser -->
  <script src="js/parser.js"></script>
  <!-- App -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
